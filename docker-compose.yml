services:
  cassandra-node-1:
    image: cassandra:4.1
    container_name: cassandra-node-1
    hostname: cassandra-node-1
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: cinema-cluster
      CASSANDRA_DC: datacenter1
      CASSANDRA_RACK: rack1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_NUM_TOKENS: 16
    volumes:
      - cassandra-node-1-data:/var/lib/cassandra
      - ./cassandra:/cql
    networks:
      - cassandra-network

  cassandra-node-2:
    image: cassandra:4.1
    container_name: cassandra-node-2
    hostname: cassandra-node-2
    ports:
      - "9043:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: cinema-cluster
      CASSANDRA_DC: datacenter1
      CASSANDRA_RACK: rack1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_SEEDS: cassandra-node-1
      CASSANDRA_NUM_TOKENS: 16
    depends_on:
      - cassandra-node-1
    volumes:
      - cassandra-node-2-data:/var/lib/cassandra
    networks:
      - cassandra-network

  cassandra-node-3:
    image: cassandra:4.1
    container_name: cassandra-node-3
    hostname: cassandra-node-3
    ports:
      - "9044:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: cinema-cluster
      CASSANDRA_DC: datacenter1
      CASSANDRA_RACK: rack1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_SEEDS: cassandra-node-1
      CASSANDRA_NUM_TOKENS: 16
    depends_on:
      - cassandra-node-1
    volumes:
      - cassandra-node-3-data:/var/lib/cassandra
    networks:
      - cassandra-network

networks:
  cassandra-network:
    driver: bridge

volumes:
  cassandra-node-1-data:
  cassandra-node-2-data:
  cassandra-node-3-data: